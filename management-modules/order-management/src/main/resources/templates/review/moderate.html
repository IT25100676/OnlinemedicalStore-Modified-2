<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
  <div class="page-header">
    <div class="container d-flex justify-content-between align-items-end gap-3 flex-wrap">
      <div>
        <h1>Review Management</h1>
        <p class="text-muted mb-0">Approve customer reviews before they appear on medicine pages.</p>
      </div>
      <div class="btn-group">
        <a class="btn btn-outline-primary" th:classappend="${status == 'pending' ? ' active' : ''}"
           th:href="@{/reviews/admin/reviews(status='pending')}">Pending</a>
        <a class="btn btn-outline-primary" th:classappend="${status == 'all' ? ' active' : ''}"
           th:href="@{/reviews/admin/reviews(status='all')}">All</a>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="card">
      <div class="card-header"><span class="dot"></span> Reviews</div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped align-middle">
            <thead>
            <tr>
              <th>ID</th>
              <th>Medicine</th>
              <th>User</th>
              <th>Rating</th>
              <th>Comment</th>
              <th>Status</th>
              <th>Date</th>
              <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="review : ${reviews}">
              <td th:text="${review.id}">1</td>
              <td th:text="${review.medicine != null ? review.medicine.name : '-'}">Medicine</td>
              <td th:text="${review.user != null ? review.user.username : '-'}">User</td>
              <td>
                <span th:text="${review.rating}">5</span><span class="text-muted">/5</span>
              </td>
              <td style="min-width: 260px;" th:text="${review.comment}">Comment</td>
              <td>
                <span class="badge" th:classappend="${review.approved ? 'bg-success' : 'bg-warning'}"
                      th:text="${review.approved ? 'Approved' : 'Pending'}">Pending</span>
              </td>
              <td th:text="${review.reviewDate != null ? #temporals.format(review.reviewDate, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
              <td class="text-end">
                <form th:if="${!review.approved}" th:action="@{/reviews/admin/{id}/approve(id=${review.id})}" method="post" class="d-inline">
                  <button class="btn btn-primary btn-sm" type="submit">Approve</button>
                </form>
                <form th:action="@{/reviews/admin/{id}/reject(id=${review.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Remove this review?')">
                  <button class="btn btn-outline-danger btn-sm" type="submit" th:text="${review.approved ? 'Remove' : 'Reject'}">Reject</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(reviews)}">
              <td colspan="8" class="text-center text-muted py-4">No reviews found.</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
