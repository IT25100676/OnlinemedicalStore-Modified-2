<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
  <div class="page-header">
    <div class="container">
      <h1 th:text="${existingReview != null ? 'Edit Review' : 'Write a Review'}">Write a Review</h1>
      <p class="text-muted mb-0" th:text="${medicine.name}">Medicine</p>
    </div>
  </div>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card">
          <div class="card-header"><span class="dot"></span> Review Details</div>
          <div class="card-body">
            <div th:if="${existingReview != null}" class="alert alert-info">
              This form is editing your submitted review.
              <span th:text="${existingReview.approved ? 'It is currently approved.' : 'It is currently under moderation.'}">Status</span>
            </div>

            <form method="post" th:action="@{/reviews/add}" class="d-grid gap-3">
              <input type="hidden" name="medicineId" th:value="${medicine.id}">

              <div>
                <label class="form-label">Medicine</label>
                <input class="form-control" th:value="${medicine.name}" readonly>
              </div>

              <div>
                <label class="form-label">Rating</label>
                <select name="rating" class="form-select" required>
                  <option value="5" th:selected="${existingReview != null and existingReview.rating == 5}">5 - Excellent</option>
                  <option value="4" th:selected="${existingReview != null and existingReview.rating == 4}">4 - Good</option>
                  <option value="3" th:selected="${existingReview != null and existingReview.rating == 3}">3 - Average</option>
                  <option value="2" th:selected="${existingReview != null and existingReview.rating == 2}">2 - Poor</option>
                  <option value="1" th:selected="${existingReview != null and existingReview.rating == 1}">1 - Bad</option>
                </select>
              </div>

              <div>
                <label class="form-label">Review</label>
                <textarea name="comment" class="form-control" rows="6" maxlength="1000"
                          placeholder="Share your experience with this medicine..."
                          required th:text="${existingReview != null ? existingReview.comment : ''}"></textarea>
              </div>

              <div class="d-flex gap-2 justify-content-end flex-wrap">
                <a th:href="@{/medicines/{id}(id=${medicine.id})}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary"
                        th:text="${existingReview != null ? 'Update Review' : 'Submit Review'}">Submit Review</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
