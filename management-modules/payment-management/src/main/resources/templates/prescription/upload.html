<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
  <div class="page-header">
    <div class="container">
      <h1>Upload Prescription</h1>
    </div>
  </div>
  <div class="container py-4">
    <div class="card">
      <div class="card-body">
        <form method="post" enctype="multipart/form-data" th:action="@{/prescriptions/upload}">
          <div class="mb-3">
             <input type="file" name="file" class="form-control" />
          </div>
          <button type="submit" class="btn btn-primary">Upload</button>
        </form>
      </div>
    </div>
  </div>
</main>
</body>
</html>
