<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | MediStore</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page admin-auth-page">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="text-center mb-4">
        <div class="admin-login-mark">Admin</div>
        <h1>Admin <span>Console</span></h1>
        <p>Sign in with an admin account from the separate admin database.</p>
      </div>
      <div class="form-card fade-in">
        <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>
        <div th:if="${param.error}" class="alert alert-danger mb-3" th:text="${param.error}">Please login first.</div>
        <form th:action="@{/auth/admin/login}" method="post">
          <div class="mb-3">
            <label class="form-label">Admin username or email</label>
            <input type="text" name="username" class="form-control" placeholder="admin" required autofocus/>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="admin123" required/>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg mt-2">Sign In</button>
        </form>
      </div>
      <p class="text-center mt-3">
        <a th:href="@{/auth/customer/login}">Customer login</a>
        <span class="mx-2">/</span>
        <a th:href="@{/}">Back to home</a>
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
