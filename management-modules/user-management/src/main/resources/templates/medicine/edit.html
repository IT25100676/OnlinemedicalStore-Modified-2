<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Medicine | MediStore</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar navbar-expand-lg"><div class="container">
  <a class="navbar-brand" th:href="@{/}">💊 Medi<span>Store</span></a>
  <ul class="navbar-nav ms-auto">
    <li class="nav-item"><a class="nav-link" th:href="@{/medicines}">💊 Medicines</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">📊 Dashboard</a></li>
    <li class="nav-item"><a class="nav-link text-danger" th:href="@{/auth/logout}">🚪 Logout</a></li>
  </ul>
</div></nav>

<div class="page-header"><div class="container">
  <h1>✏️ Edit Medicine</h1>
  <p th:text="${medicine.name}">Name</p>
</div></div>

<div class="container py-4">
  <div th:if="${error}" class="alert alert-danger">❌ <span th:text="${error}"></span></div>
  <div class="row justify-content-center"><div class="col-lg-8">
    <div class="form-card">
      <form th:action="@{/medicines/{id}/edit(id=${medicine.id})}" method="post">
        <div class="mb-3">
          <label class="form-label">Medicine Type</label>
          <input type="text" class="form-control" th:value="${medicine.medicineType.name()}" readonly
                 style="background:#f8f9fa;font-weight:600;"/>
          <input type="hidden" name="medicineType" th:value="${medicine.medicineType.name()}"/>
        </div>
        <div class="row g-3">
          <div class="col-md-8"><label class="form-label">Name *</label>
            <input type="text" name="name" class="form-control" th:value="${medicine.name}" required/></div>
          <div class="col-md-4"><label class="form-label">Category *</label>
            <input type="text" name="category" class="form-control" th:value="${medicine.category}" required/></div>
          <div class="col-md-4"><label class="form-label">Price (Rs.) *</label>
            <input type="number" name="price" class="form-control" th:value="${medicine.price}" required step="0.01" min="0"/></div>
          <div class="col-md-4"><label class="form-label">Stock *</label>
            <input type="number" name="stock" class="form-control" th:value="${medicine.stock}" required min="0"/></div>
          <div class="col-md-4"><label class="form-label">Expiry Date</label>
            <input type="date" name="expiryDate" class="form-control" th:value="${medicine.expiryDate}"/></div>
          <div class="col-md-6"><label class="form-label">Manufacturer</label>
            <input type="text" name="manufacturer" class="form-control" th:value="${medicine.manufacturer}"/></div>
          <div class="col-md-6 d-flex align-items-end">
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" name="requiresPrescription" id="rxCheck"
                     th:checked="${medicine.requiresPrescription}"/>
              <label class="form-check-label fw-600" for="rxCheck">🔒 Requires Prescription</label>
            </div>
          </div>
          <div class="col-12"><label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3" th:text="${medicine.description}"></textarea></div>
        </div>

        <!-- Tablet fields -->
        <div th:if="${medicine.medicineType.name() == 'TABLET'}" class="mt-4">
          <hr/><h6 class="fw-bold text-primary mb-3">💊 Tablet Details</h6>
          <div class="row g-3">
            <div class="col-md-4"><label class="form-label">Dosage</label>
              <input type="text" name="dosage" class="form-control" th:value="${medicine.dosage}"/></div>
            <div class="col-md-4"><label class="form-label">Tablet Count</label>
              <input type="number" name="tabletCount" class="form-control" th:value="${medicine.tabletCount}"/></div>
            <div class="col-md-4"><label class="form-label">Coating Type</label>
              <input type="text" name="coatingType" class="form-control" th:value="${medicine.coatingType}"/></div>
          </div>
        </div>

        <!-- Syrup fields -->
        <div th:if="${medicine.medicineType.name() == 'SYRUP'}" class="mt-4">
          <hr/><h6 class="fw-bold text-success mb-3">🧴 Syrup Details</h6>
          <div class="row g-3">
            <div class="col-md-4"><label class="form-label">Volume (ml)</label>
              <input type="number" name="volumeMl" class="form-control" th:value="${medicine.volumeMl}"/></div>
            <div class="col-md-4"><label class="form-label">Flavor</label>
              <input type="text" name="flavor" class="form-control" th:value="${medicine.flavor}"/></div>
            <div class="col-md-4"><label class="form-label">Dosage per ml</label>
              <input type="text" name="dosagePerMl" class="form-control" th:value="${medicine.dosagePerMl}"/></div>
          </div>
        </div>

        <!-- Injection fields -->
        <div th:if="${medicine.medicineType.name() == 'INJECTION'}" class="mt-4">
          <hr/><h6 class="fw-bold mb-3" style="color:#c0392b;">💉 Injection Details</h6>
          <div class="row g-3">
            <div class="col-md-4"><label class="form-label">Concentration</label>
              <input type="text" name="concentration" class="form-control" th:value="${medicine.concentration}"/></div>
            <div class="col-md-4"><label class="form-label">Injection Type</label>
              <input type="text" name="injectionType" class="form-control" th:value="${medicine.injectionType}"/></div>
            <div class="col-md-4"><label class="form-label">Volume (ml)</label>
              <input type="number" name="volumeMl" class="form-control" step="0.1" th:value="${medicine.volumeMl}"/></div>
          </div>
        </div>

        <div class="d-flex gap-3 mt-4">
          <button type="submit" class="btn btn-primary btn-lg">💾 Save Changes</button>
          <a th:href="@{/medicines}" class="btn btn-outline-primary btn-lg">Cancel</a>
        </div>
      </form>
    </div>
  </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
