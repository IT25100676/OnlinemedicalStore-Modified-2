<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
    <div class="page-header text-center py-5 glass-header">
        <div class="container">
            <h1 class="display-4 fw-bold text-white">Payment History</h1>
            <p class="lead text-white-50">Review your past transactions</p>
        </div>
    </div>
    
    <div class="container py-5">
        <div class="card premium-card shadow border-0 rounded-4 overflow-hidden">
            <div class="card-body p-0">
                <div th:if="${payments == null or payments.empty}" class="text-center p-5">
                    <div class="display-1 text-muted mb-3"><i class="fas fa-file-invoice-dollar opacity-25"></i></div>
                    <h3 class="text-muted">No payments found</h3>
                    <p>You haven't made any payments yet.</p>
                    <a th:href="@{/orders}" class="btn btn-primary premium-btn mt-3">View Orders</a>
                </div>

                <div class="table-responsive" th:if="${payments != null and !payments.empty}">
                    <table class="table table-hover align-middle mb-0 custom-table">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Date</th>
                                <th>Transaction ID</th>
                                <th>Order ID</th>
                                <th>Method</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="payment : ${payments}">
                                <td class="ps-4">
                                    <div class="fw-bold" th:text="${#temporals.format(payment.paymentDate, 'dd MMM yyyy')}">Date</div>
                                    <small class="text-muted" th:text="${#temporals.format(payment.paymentDate, 'HH:mm')}">Time</small>
                                </td>
                                <td>
                                    <span class="font-monospace bg-light border px-2 py-1 rounded small text-muted" th:text="${payment.transactionId}">TXN123</span>
                                </td>
                                <td>
                                    <a th:href="@{/orders/{id}(id=${payment.order.id})}" class="text-decoration-none fw-bold text-primary">#[[${payment.order.id}]]</a>
                                </td>
                                <td>
                                    <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary" th:text="${payment.getPaymentMethod()}">Method</span>
                                </td>
                                <td>
                                    <span class="fw-bold text-dark" th:text="'Rs. ' + ${payment.amount}">0.00</span>
                                </td>
                                <td>
                                    <span class="badge rounded-pill"
                                          th:classappend="${payment.status.name() == 'SUCCESS' ? 'bg-success' : (payment.status.name() == 'FAILED' ? 'bg-danger' : 'bg-warning')}"
                                          th:text="${payment.status}">STATUS</span>
                                </td>
                                <td class="text-end pe-4">
                                    <a th:href="@{/orders/{id}/invoice(id=${payment.order.id})}" class="btn btn-sm btn-outline-primary premium-btn rounded-pill px-3">
                                        <i class="fas fa-file-invoice me-1"></i> Invoice
                                    </a>
                                    <form th:if="${currentUser != null and currentUser.roleString == 'ADMIN'}"
                                          th:action="@{/admin/payments/{id}/status(id=${payment.id})}" method="post" class="d-inline-flex gap-1 align-items-center mt-1">
                                        <select name="status" class="form-select form-select-sm" style="width: 120px;">
                                            <option value="PENDING" th:selected="${payment.status.name() == 'PENDING'}">PENDING</option>
                                            <option value="SUCCESS" th:selected="${payment.status.name() == 'SUCCESS'}">SUCCESS</option>
                                            <option value="FAILED" th:selected="${payment.status.name() == 'FAILED'}">FAILED</option>
                                        </select>
                                        <button class="btn btn-sm btn-outline-primary" type="submit">Update</button>
                                    </form>
                                    <form th:if="${currentUser != null and currentUser.roleString == 'ADMIN'}"
                                          th:action="@{/admin/payments/{id}/delete(id=${payment.id})}" method="post" class="d-inline"
                                          onsubmit="return confirm('Delete this payment record?')">
                                        <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</main>
</body>
</html>
