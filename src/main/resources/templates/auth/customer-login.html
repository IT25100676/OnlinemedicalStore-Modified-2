<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | MediStore</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="text-center mb-4">
        <div style="font-size:3rem;">💊</div>
        <h1 style="color:white;font-weight:800;font-size:1.8rem;">Welcome to <span style="color:#00b894;">MediStore</span></h1>
        <p style="color:rgba(255,255,255,0.65);font-size:0.9rem;">Sign in to your account</p>
      </div>
      <div class="form-card fade-in">
        <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>
        <div th:if="${param.error}" class="alert alert-danger mb-3">Invalid username or password.</div>
        <form th:action="@{/auth/customer/login}" method="post">
          <div class="mb-3">
            <label class="form-label">Username or Email</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username or email" required autofocus/>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg mt-2">🔑 Sign In</button>
        </form>
        <hr class="my-3"/>
        <p class="text-center mb-0" style="font-size:0.9rem;">
          Don't have an account? <a th:href="@{/auth/register}" style="color:var(--primary);font-weight:600;">Register here</a>
        </p>
      </div>
      <p class="text-center mt-3" style="color:rgba(255,255,255,0.5);font-size:0.8rem;">
        <a th:href="@{/}" style="color:rgba(255,255,255,0.65);">← Back to Home</a>
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
