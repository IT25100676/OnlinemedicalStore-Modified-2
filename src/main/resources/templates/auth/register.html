<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | MediStore</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
      <div class="text-center mb-4">
        <div style="font-size:3rem;">💊</div>
        <h1 style="color:white;font-weight:800;font-size:1.8rem;">Create Account</h1>
        <p style="color:rgba(255,255,255,0.65);font-size:0.9rem;">Join MediStore today</p>
      </div>
      <div class="form-card fade-in">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/auth/register}" method="post">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Username *</label>
              <input type="text" name="username" class="form-control" placeholder="Choose a username" required minlength="3"/>
            </div>
            <div class="col-12">
              <label class="form-label">Email *</label>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password *</label>
              <input type="password" name="password" id="pwd" class="form-control" placeholder="Min 6 chars" required minlength="6"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Confirm Password *</label>
              <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="tel" name="phone" class="form-control" placeholder="+94 77 000 0000"/>
            </div>
            <div class="col-12">
              <label class="form-label">Address</label>
              <textarea name="address" class="form-control" rows="2" placeholder="Delivery address"></textarea>
            </div>
          </div>
          <button type="submit" class="btn btn-success w-100 btn-lg mt-4">✅ Create Account</button>
        </form>
        <hr class="my-3"/>
        <p class="text-center mb-0" style="font-size:0.9rem;">
          Already have an account? <a th:href="@{/auth/customer/login}" style="color:var(--primary);font-weight:600;">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
