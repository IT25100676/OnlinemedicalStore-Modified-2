<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Medicine | MediStore</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar navbar-expand-lg"><div class="container">
  <a class="navbar-brand" th:href="@{/}">💊 Medi<span>Store</span></a>
  <ul class="navbar-nav ms-auto">
    <li class="nav-item"><a class="nav-link" th:href="@{/medicines}">💊 Medicines</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">📊 Dashboard</a></li>
    <li class="nav-item"><a class="nav-link text-danger" th:href="@{/auth/logout}">🚪 Logout</a></li>
  </ul>
</div></nav>

<div class="page-header"><div class="container">
  <nav aria-label="breadcrumb"><ol class="breadcrumb">
    <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
    <li class="breadcrumb-item"><a th:href="@{/medicines}">Medicines</a></li>
    <li class="breadcrumb-item active">Add Medicine</li>
  </ol></nav>
  <h1>➕ Add New Medicine</h1>
</div></div>

<div class="container py-4">
  <div th:if="${error}" class="alert alert-danger">❌ <span th:text="${error}"></span></div>
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="form-card">
        <form th:action="@{/medicines/add}" method="post">
          <div class="mb-4">
            <label class="form-label">Medicine Type *</label>
            <select name="medicineType" id="medicineType" class="form-select" required onchange="showTypeFields(this.value)">
              <option value="">Select type...</option>
              <option value="TABLET">💊 Tablet</option>
              <option value="SYRUP">🧴 Syrup</option>
              <option value="INJECTION">💉 Injection</option>
            </select>
          </div>
          <div class="row g-3">
            <div class="col-md-8"><label class="form-label">Medicine Name *</label>
              <input type="text" name="name" class="form-control" required placeholder="e.g. Paracetamol 500mg"/></div>
            <div class="col-md-4"><label class="form-label">Category *</label>
              <input type="text" name="category" class="form-control" required placeholder="e.g. Pain Relief"/></div>
            <div class="col-md-4"><label class="form-label">Price (Rs.) *</label>
              <input type="number" name="price" class="form-control" required step="0.01" min="0" placeholder="0.00"/></div>
            <div class="col-md-4"><label class="form-label">Stock Qty *</label>
              <input type="number" name="stock" class="form-control" required min="0" placeholder="0"/></div>
            <div class="col-md-4"><label class="form-label">Expiry Date</label>
              <input type="date" name="expiryDate" class="form-control"/></div>
            <div class="col-md-6"><label class="form-label">Manufacturer</label>
              <input type="text" name="manufacturer" class="form-control" placeholder="e.g. ABC Pharma"/></div>
            <div class="col-md-6 d-flex align-items-end">
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="requiresPrescription" id="rxCheck"/>
                <label class="form-check-label fw-600" for="rxCheck">🔒 Requires Prescription</label>
              </div>
            </div>
            <div class="col-12"><label class="form-label">Description</label>
              <textarea name="description" class="form-control" rows="3" placeholder="Medicine description..."></textarea></div>
          </div>

          <!-- TABLET fields -->
          <div id="tabletFields" class="type-fields mt-4 d-none">
            <hr/><h6 class="fw-bold text-primary mb-3">💊 Tablet Details</h6>
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">Dosage</label>
                <input type="text" name="dosage" class="form-control" placeholder="e.g. 500mg"/></div>
              <div class="col-md-4"><label class="form-label">Tablet Count</label>
                <input type="number" name="tabletCount" class="form-control" min="1" placeholder="e.g. 10"/></div>
              <div class="col-md-4"><label class="form-label">Coating Type</label>
                <input type="text" name="coatingType" class="form-control" placeholder="e.g. Film-coated"/></div>
            </div>
          </div>

          <!-- SYRUP fields -->
          <div id="syrupFields" class="type-fields mt-4 d-none">
            <hr/><h6 class="fw-bold text-success mb-3">🧴 Syrup Details</h6>
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">Volume (ml)</label>
                <input type="number" name="volumeMl" class="form-control" placeholder="e.g. 100"/></div>
              <div class="col-md-4"><label class="form-label">Flavor</label>
                <input type="text" name="flavor" class="form-control" placeholder="e.g. Strawberry"/></div>
              <div class="col-md-4"><label class="form-label">Dosage per ml</label>
                <input type="text" name="dosagePerMl" class="form-control" placeholder="e.g. 5mg/ml"/></div>
            </div>
          </div>

          <!-- INJECTION fields -->
          <div id="injectionFields" class="type-fields mt-4 d-none">
            <hr/><h6 class="fw-bold mb-3" style="color:#c0392b;">💉 Injection Details</h6>
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">Concentration</label>
                <input type="text" name="concentration" class="form-control" placeholder="e.g. 50mg/ml"/></div>
              <div class="col-md-4"><label class="form-label">Injection Type</label>
                <input type="text" name="injectionType" class="form-control" placeholder="e.g. IV, IM, SC"/></div>
              <div class="col-md-4"><label class="form-label">Volume (ml)</label>
                <input type="number" name="volumeMl" class="form-control" step="0.1" placeholder="e.g. 5.0"/></div>
            </div>
          </div>

          <div class="d-flex gap-3 mt-4">
            <button type="submit" class="btn btn-primary btn-lg">➕ Add Medicine</button>
            <a th:href="@{/medicines}" class="btn btn-outline-primary btn-lg">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showTypeFields(type) {
  document.querySelectorAll('.type-fields').forEach(el => el.classList.add('d-none'));
  if (type === 'TABLET') document.getElementById('tabletFields').classList.remove('d-none');
  else if (type === 'SYRUP') document.getElementById('syrupFields').classList.remove('d-none');
  else if (type === 'INJECTION') document.getElementById('injectionFields').classList.remove('d-none');
}
</script>
</body>
</html>
