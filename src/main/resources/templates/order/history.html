<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
  <div class="page-header">
    <div class="container">
      <h1>Order History</h1>
    </div>
  </div>
  <div class="container py-4">
    <div th:if="${orders == null or orders.empty}" class="card">
      <div class="card-body text-center py-5">
        <h3 class="text-muted mb-3">No orders found</h3>
        <p class="text-muted">Orders will appear here after checkout.</p>
        <a th:href="@{/medicines}" class="btn btn-primary mt-2">Shop Medicines</a>
      </div>
    </div>

    <div th:if="${orders != null and !orders.empty}" class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Your Orders</h5>
        <span class="text-muted small" th:text="${orders.size()} + ' order(s)'">0 order(s)</span>
      </div>
      <div class="table-responsive">
        <table class="table mb-0 align-middle">
          <thead>
            <tr>
              <th>Order</th>
              <th>Date</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
              <th class="text-end">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="order : ${orders}">
              <td>
                <a th:href="@{/orders/{id}(id=${order.id})}" class="fw-bold text-decoration-none"
                   th:text="'#' + ${order.id}">#1</a>
                <div class="text-muted small" th:if="${currentUser != null and currentUser.roleString == 'ADMIN'}"
                     th:text="${order.customer != null ? order.customer.username : 'Customer unavailable'}">Customer</div>
              </td>
              <td>
                <span th:if="${order.orderDate != null}" th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}">Date</span>
                <span th:if="${order.orderDate == null}" class="text-muted">Not available</span>
                <div class="text-muted small" th:if="${order.orderDate != null}" th:text="${#temporals.format(order.orderDate, 'HH:mm')}">Time</div>
              </td>
              <td th:text="${order.items != null ? order.items.size() : 0}">0</td>
              <td class="fw-bold" th:text="'Rs. ' + ${order.totalAmount}">Rs. 0.00</td>
              <td>
                <span class="badge"
                      th:classappend="${order.status.name() == 'CANCELLED' ? 'bg-danger' : (order.status.name() == 'DELIVERED' ? 'bg-success' : 'bg-warning')}"
                      th:text="${order.status}">PENDING</span>
              </td>
              <td class="text-end">
                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">View</a>
                <a th:href="@{/orders/{id}/invoice(id=${order.id})}" class="btn btn-sm btn-outline-secondary">Invoice</a>
                <form th:if="${currentUser != null and currentUser.roleString == 'ADMIN'}"
                      th:action="@{/admin/orders/{id}/delete(id=${order.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Delete this order?')">
                  <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>
</body>
</html>
