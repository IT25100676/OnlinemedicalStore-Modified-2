<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
  <div class="page-header">
    <div class="container">
      <h1>Review Prescription</h1>
      <p class="text-muted mb-0" th:text="${prescription.fileName}">Prescription file</p>
    </div>
  </div>
  <div class="container py-4">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card h-100">
          <div class="card-header"><span class="dot"></span> Prescription File</div>
          <div class="card-body">
            <p><strong>Customer:</strong> <span th:text="${prescription.user != null ? prescription.user.username : 'Unavailable'}">Customer</span></p>
            <p><strong>Doctor:</strong> <span th:text="${prescription.doctorName != null and !prescription.doctorName.isBlank() ? prescription.doctorName : 'Not provided'}">Doctor</span></p>
            <p><strong>Issue date:</strong>
              <span th:if="${prescription.issueDate != null}" th:text="${#temporals.format(prescription.issueDate, 'dd MMM yyyy')}">Date</span>
              <span th:if="${prescription.issueDate == null}">Not provided</span>
            </p>
            <p><strong>Status:</strong> <span class="badge bg-warning" th:text="${prescription.status}">PENDING</span></p>
            <a th:href="@{/uploads/prescriptions/{file}(file=${prescription.filePath})}" target="_blank" class="btn btn-outline-primary">Open Uploaded File</a>
          </div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card h-100">
          <div class="card-header"><span class="dot"></span> Admin Decision</div>
          <div class="card-body">
            <form th:action="@{/prescriptions/{id}/review(id=${prescription.id})}" method="post" class="d-grid gap-3">
              <div>
                <label class="form-label">Status</label>
                <select name="status" class="form-select" required>
                  <option value="APPROVED">Approve</option>
                  <option value="REJECTED">Reject</option>
                  <option value="PENDING">Keep Pending</option>
                </select>
              </div>
              <div>
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="5" th:text="${prescription.notes}" placeholder="Optional notes for the customer"></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Save Decision</button>
              <a th:href="@{/prescriptions/admin/review}" class="btn btn-outline-secondary">Back to Rx Queue</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
