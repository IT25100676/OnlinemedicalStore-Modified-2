<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
  <div class="page-header">
    <div class="container">
      <h1>Reviews</h1>
      <p class="text-muted mb-0" th:text="${medicine.name}">Medicine</p>
    </div>
  </div>

  <div class="container py-4">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><span class="dot"></span> Customer Reviews</span>
        <span th:text="${#numbers.formatDecimal(avgRating,1,1) + '/5 average'}">0.0/5 average</span>
      </div>
      <div class="card-body">
        <div class="mb-3" th:if="${currentUser != null}">
          <a th:href="@{/reviews/add(medicineId=${medicine.id})}" class="btn btn-primary">Write a Review</a>
        </div>

        <div th:if="${#lists.isEmpty(reviews)}" class="text-center text-muted py-4">
          No approved reviews yet.
        </div>

        <div th:each="review : ${reviews}" class="border-bottom pb-3 mb-3">
          <div class="d-flex justify-content-between gap-3 flex-wrap">
            <div>
              <strong th:text="${review.user != null ? review.user.username : 'Customer'}">Customer</strong>
              <span class="badge bg-success ms-2" th:text="${review.displayBadge}">Review</span>
            </div>
            <div>
              <span th:text="${review.rating}">5</span><span class="text-muted">/5</span>
            </div>
          </div>
          <p class="mt-2 mb-1" th:text="${review.comment}">Comment</p>
          <small class="text-muted" th:text="${review.reviewDate != null ? #temporals.format(review.reviewDate,'dd MMM yyyy') : ''}">Date</small>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
