<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
  <div class="page-header">
    <div class="container">
      <h1>Order Detail</h1>
    </div>
  </div>
  <div class="container py-4">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0" th:text="'Order #' + ${order.id}">Order #1</h5>
            <span class="badge"
                  th:classappend="${order.status.name() == 'CANCELLED' ? 'bg-danger' : (order.status.name() == 'DELIVERED' ? 'bg-success' : 'bg-warning')}"
                  th:text="${order.status}">PENDING</span>
          </div>
          <div class="table-responsive">
            <table class="table mb-0 align-middle">
              <thead>
                <tr>
                  <th>Medicine</th>
                  <th>Quantity</th>
                  <th>Unit Price</th>
                  <th>Subtotal</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="item : ${order.items}">
                  <td>
                    <div class="fw-bold" th:text="${item.medicine.name}">Medicine name</div>
                    <small class="text-muted" th:text="${item.medicine.category}">Category</small>
                  </td>
                  <td th:text="${item.quantity}">1</td>
                  <td th:text="'Rs. ' + ${item.unitPrice}">Rs. 0.00</td>
                  <td class="fw-bold" th:text="'Rs. ' + ${item.subtotal}">Rs. 0.00</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card">
          <div class="card-header">
            <h5 class="mb-0">Order Summary</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <div class="text-muted small">Order Date</div>
              <div th:if="${order.orderDate != null}" th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, HH:mm')}">Date</div>
              <div th:if="${order.orderDate == null}">Not available</div>
            </div>
            <div class="mb-3">
              <div class="text-muted small">Delivery Address</div>
              <div th:text="${order.deliveryAddress}">Address</div>
            </div>
            <div class="mb-3" th:if="${order.notes != null and !order.notes.isBlank()}">
              <div class="text-muted small">Notes</div>
              <div th:text="${order.notes}">Notes</div>
            </div>
            <div class="d-flex justify-content-between fs-5 border-top pt-3">
              <span>Total</span>
              <strong class="text-success" th:text="'Rs. ' + ${order.totalAmount}">Rs. 0.00</strong>
            </div>
            <div class="d-grid gap-2 mt-4">
              <a th:href="@{/orders/{id}/invoice(id=${order.id})}" class="btn btn-primary">View Invoice</a>
              <a th:href="@{/orders}" class="btn btn-outline-secondary">Back to Orders</a>
            </div>
          </div>
        </div>

        <div class="card mt-4" th:if="${currentUser != null and currentUser.roleString == 'ADMIN'}">
          <div class="card-header">
            <h5 class="mb-0">Admin Order Controls</h5>
          </div>
          <div class="card-body d-grid gap-3">
            <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="d-flex gap-2">
              <select name="status" class="form-select">
                <option value="PENDING" th:selected="${order.status.name() == 'PENDING'}">PENDING</option>
                <option value="PROCESSING" th:selected="${order.status.name() == 'PROCESSING'}">PROCESSING</option>
                <option value="SHIPPED" th:selected="${order.status.name() == 'SHIPPED'}">SHIPPED</option>
                <option value="DELIVERED" th:selected="${order.status.name() == 'DELIVERED'}">DELIVERED</option>
                <option value="CANCELLED" th:selected="${order.status.name() == 'CANCELLED'}">CANCELLED</option>
              </select>
              <button class="btn btn-primary" type="submit">Update</button>
            </form>

            <form th:action="@{/admin/orders/{id}/delivery(id=${order.id})}" method="post" class="d-grid gap-2">
              <label class="form-label">Delivery Address</label>
              <textarea class="form-control" name="deliveryAddress" rows="3" th:text="${order.deliveryAddress}" required></textarea>
              <label class="form-label">Notes</label>
              <textarea class="form-control" name="notes" rows="2" th:text="${order.notes}"></textarea>
              <button class="btn btn-outline-primary" type="submit">Save Delivery Details</button>
            </form>

            <form th:action="@{/admin/orders/{id}/delete(id=${order.id})}" method="post"
                  onsubmit="return confirm('Delete this order?')">
              <button class="btn btn-outline-danger w-100" type="submit">Delete Order</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
